name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'mobile_app/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-frontend-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Build Flutter web
        working-directory: mobile_app
        run: |
          flutter pub get
          flutter build web --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: mobile_app/build/web/
          retention-days: 1

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: build
    if: vars.FRONTEND_HOSTING == 'cloudflare' || vars.FRONTEND_HOSTING == ''
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/ --project-name=coindcx-trading-agent --branch=${{ github.event.inputs.environment || 'staging' }}

  deploy-cloudfront:
    name: Deploy to S3/CloudFront
    needs: build
    if: vars.FRONTEND_HOSTING == 'cloudfront'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    env:
      AWS_REGION: ap-south-1
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync build/ \
            "s3://${{ secrets.FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "flutter_service_worker.js"

          aws s3 cp build/index.html \
            "s3://${{ secrets.FRONTEND_BUCKET }}/index.html" \
            --cache-control "public, max-age=0, must-revalidate"

          aws s3 cp build/flutter_service_worker.js \
            "s3://${{ secrets.FRONTEND_BUCKET }}/flutter_service_worker.js" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/index.html" "/flutter_service_worker.js"
