name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'tsconfig.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-backend-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  PROJECT_NAME: coindcx-trading-agent

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_repository: ${{ steps.meta.outputs.ecr_repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          ECR_REPOSITORY="${{ env.PROJECT_NAME }}"
          IMAGE_TAG="sha-${GITHUB_SHA::8}"
          echo "ecr_repository=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.ecr_repository }}:${{ steps.meta.outputs.image_tag }}

  deploy:
    name: Deploy ECS Services
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    strategy:
      max-parallel: 2
      matrix:
        service: [api, data-ingestion, signal-worker, executor, supervisor]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        id: current-task
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          FAMILY="${{ env.PROJECT_NAME }}-${ENV}-${{ matrix.service }}"
          aws ecs describe-task-definition \
            --task-definition "$FAMILY" \
            --query 'taskDefinition' \
            --output json > task-def.json

      - name: Update image in task definition
        id: update-task
        run: |
          IMAGE="${{ needs.build-and-push.outputs.ecr_repository }}:${{ needs.build-and-push.outputs.image_tag }}"
          jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-def.json > new-task-def.json

      - name: Register new task definition
        id: register
        run: |
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task_definition_arn=${ARN}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          CLUSTER="coindcx-${ENV}"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "${{ matrix.service }}" \
            --task-definition "${{ steps.register.outputs.task_definition_arn }}" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          CLUSTER="coindcx-${ENV}"
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "${{ matrix.service }}" \
            --timeout 300 || echo "::warning::Service ${{ matrix.service }} did not stabilize in 300s"
